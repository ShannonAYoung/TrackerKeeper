<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tracker Keeper</title>
  </head>

  <body>
    <div id="root"></div>

    <!-- Inline loader that bootstraps your Vite build -->
    <script type="module">
      // Detect if running in dev mode (Vite dev server)
      const isDev = location.hostname === "trackerkeeperapp.onrender.com" || location.port === "3000";

      if (isDev) {
        // Load Vite dev server entry
        import("/src/main.tsx");
      } else {
        // Load the production bundle generated by Vite
        // Vite always outputs a manifest file that maps entry → hashed bundle
        fetch("/manifest.json")
          .then(res => res.json())
          .then(manifest => {
            const entry = manifest["src/main.tsx"].file;
            import("/" + entry);
          })
          .catch(err => {
            console.error("Failed to load Vite bundle:", err);
          });
      }
    </script>
  </body>
</html>
